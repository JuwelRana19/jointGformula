name: R-CMD-check

on:
  push:
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      R_CHECK_ARGS: "--no-manual"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true

      - name: Install suggested packages
        shell: bash
        run: |
          Rscript -e "install.packages(c('future','future.apply','progressr'), repos='https://cloud.r-project.org', dependencies=TRUE)"

      - name: Install rcmdcheck (required by check-r-package)
        shell: bash
        run: |
          Rscript -e "install.packages('rcmdcheck', repos='https://cloud.r-project.org', dependencies=TRUE)"

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: ${{ env.R_CHECK_ARGS }}

